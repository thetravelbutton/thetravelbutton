<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The TravelButton | Professional Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F9FAFA; color: #1A1A1A; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <header class="mb-12 border-b border-gray-200 pb-8">
            <h1 class="text-5xl font-bold text-gray-900 tracking-tighter mb-2">The TravelButton</h1>
            <p class="text-blue-600 font-semibold tracking-wide uppercase text-xs">Live Asset Stream • Flights • Rents • Events • Hype</p>
        </header>

        <div id="data-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </div>

    <script>
        const AIRTABLE_BASE_ID = 'appXGvgjygSmeuUCT'; 
        const AIRTABLE_TABLE_NAME = 'Alerts'; 
        const AIRTABLE_API_TOKEN = 'patzQKUo0MsGdjP0Q.f082f837a473a6bdfa9903d4c8d16b591a27a8f48b17db02eddec028471374a6';

        async function fetchLiveAlerts() {
            const url = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${AIRTABLE_TABLE_NAME}`;
            const res = await fetch(url, { headers: { Authorization: `Bearer ${AIRTABLE_API_TOKEN}` } });
            const data = await res.json();
            const grid = document.getElementById('data-grid');
            grid.innerHTML = '';
            
            data.records.forEach(r => {
                const f = r.fields;
                grid.innerHTML += `
                    <div class="bg-white rounded-2xl overflow-hidden hover:shadow-2xl transition-all duration-300 border border-gray-100">
                        ${f.Graphic_URL ? `<img src="${f.Graphic_URL}" class="w-full h-56 object-cover">` : ''}
                        <div class="p-8">
                            <span class="text-[10px] font-bold tracking-widest uppercase text-blue-600">${f.Pillar || 'Update'}</span>
                            <h2 class="text-2xl font-bold text-gray-950 mt-2 mb-4 tracking-tight">${f.Title || 'Untitled'}</h2>
                            <p class="text-gray-600 leading-relaxed">${f.Notes || ''}</p>
                        </div>
                    </div>
                `;
            });
        }
        fetchLiveAlerts();
    </script>
</body>
</html>
