<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The TravelButton | Live Dashboard</title>
    <style>
        /* THE TRAVELBUTTON PREMIUM IDENTITY SCRIPT */
        :root {
            --bg-cream: #FFFBF2;
            --text-brown: #854D0E;
            --accent-amber: #D97706;
            --charcoal: #1F2937;
            --white: #FFFFFF;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg-cream); color: var(--charcoal); padding: 40px 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { margin-bottom: 40px; border-bottom: 2px solid rgba(133, 77, 14, 0.1); padding-bottom: 20px; }
        h1 { color: var(--text-brown); font-size: 2.5rem; font-weight: 800; letter-spacing: -0.02em; }
        .subtitle { color: var(--accent-amber); font-size: 1.1rem; margin-top: 5px; font-weight: 500; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; margin-top: 30px; }
        .card { background: var(--white); border-radius: 12px; padding: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid rgba(133, 77, 14, 0.08); }
        .card-title { font-size: 1.4rem; font-weight: bold; color: var(--text-brown); margin-bottom: 10px; }
        .card-notes { font-size: 1rem; color: var(--charcoal); line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>The TravelButton</h1>
        <div class="subtitle">Live Asset Stream Dashboard</div>
    </header>

    <div class="grid" id="data-grid">
        </div>
</div>

<script>
    /* AUTOMATED CREDENTIAL INJECTION */
    const AIRTABLE_BASE_ID = 'appXGvgjygSmeuUCT'; 
    const AIRTABLE_TABLE_NAME = 'Alerts'; 
    const AIRTABLE_API_TOKEN = 'patzQKUo0MsGdjP0Q.f082f837a473a6bdfa9903d4c8d16b591a27a8f48b17db02eddec028471374a6';

    async function fetchLiveAlerts() {
        const url = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${AIRTABLE_TABLE_NAME}`;
        try {
            const response = await fetch(url, {
                headers: { Authorization: `Bearer ${AIRTABLE_API_TOKEN}` }
            });
            const data = await response.json();
            renderCards(data.records);
        } catch (error) {
            document.getElementById('data-grid').innerHTML = '<p>Connecting to stream...</p>';
        }
    }

    function renderCards(records) {
        const grid = document.getElementById('data-grid');
        grid.innerHTML = '';
        if (!records || records.length === 0) {
            grid.innerHTML = '<p>Stream currently empty. Items you add inside your Airtable columns will pop up here instantly!</p>';
            return;
        }
        records.forEach(record => {
            const fields = record.fields;
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-title">${fields.Title || 'Data Flash'}</div>
                <div class="card-notes">${fields.Notes || ''}</div>
            `;
            grid.appendChild(card);
        });
    }
    fetchLiveAlerts();
</script>

</body>
</html>
