<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TravelButton — Secure Travel Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2=family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* ─── DESIGN TOKENS ─────────────────────────────────────────── */
:root {
  --sage-canvas:    #7a9e87;
  --sage-mid:       #82A48D;
  --sage-light:     #a3bfab;
  --sage-xlight:    #c8dace;
  --sage-pale:      #e4ede6;
  --sage-frost:     #f0f5f1;
  --sage-deep:      #4a6b54;
  --sage-ink:       #2d4235;

  --cream:          #faf8f3;
  --cream-warm:     #f5f0e8;
  --cream-border:   #e8e2d8;

  --slate:          #2c3330;
  --slate-mid:      #3d4b45;
  --slate-soft:     #4e5e57;
  --slate-mute:     #6b7d74;

  --gold:           #c49a3c;
  --gold-light:     #dbb85a;
  --gold-pale:      #f2e4b8;

  --signal:         #c0442c;
  --signal-soft:    #e06448;
  --signal-pale:    #fde8e4;

  --text-primary:   #1e2e28;
  --text-secondary: #4a5e55;
  --text-muted:     #7a8c82;

  --ff-display:     'Playfair Display', Georgia, serif;
  --ff-body:        'DM Sans', sans-serif;
  --ff-mono:        'DM Mono', monospace;

  --radius-sm:      6px;
  --radius-md:      12px;
  --radius-lg:      20px;

  --shadow-sm:      0 1px 4px rgba(45,66,53,0.08), 0 0 0 1px rgba(45,66,53,0.04);
  --shadow-md:      0 4px 20px rgba(45,66,53,0.12), 0 1px 4px rgba(45,66,53,0.06);
  --shadow-lg:      0 12px 48px rgba(45,66,53,0.18), 0 4px 12px rgba(45,66,53,0.08);
  --shadow-card:    0 2px 12px rgba(45,66,53,0.10), 0 0 0 1px rgba(45,66,53,0.06);

  --ease-out:       cubic-bezier(0.16, 1, 0.3, 1);
}

/* ─── RESET & LAYOUT ────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--sage-canvas);
  color: var(--text-primary);
  font-family: var(--ff-body);
  font-size: 14px;
  line-height: 1.6;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(255,255,255,0.15) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 85% 85%, rgba(45,66,53,0.2) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ─── FIXED NAV ─────────────────────────────────────────────── */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0; z-index: 200;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 48px;
  background: rgba(122, 158, 135, 0.8);
  backdrop-filter: blur(20px) saturate(1.4);
  border-bottom: 1px solid rgba(255,255,255,0.2);
}
.nav-logo { display: flex; align-items: center; gap: 10px; }
.nav-logo-icon { width: 32px; height: 32px; background: var(--cream); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; box-shadow: var(--shadow-sm); }
.nav-wordmark { font-size: 16px; font-weight: 600; color: var(--cream); letter-spacing: -0.02em; }
.nav-right { display: flex; align-items: center; gap: 12px; }
.nav-pill { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.25); border-radius: 20px; padding: 5px 12px; font-size: 11px; font-weight: 500; color: var(--cream); }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: #6ee898; box-shadow: 0 0 8px #6ee898; }
.status-dot.error { background: var(--signal-soft); box-shadow: 0 0 8px var(--signal-soft); }

/* ─── HERO ──────────────────────────────────────────────────── */
.hero { min-height: 70vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 120px 24px 40px; text-align: center; position: relative; z-index: 1; }
.hero-headline { font-family: var(--ff-display); font-size: clamp(40px, 5.5vw, 64px); font-weight: 400; line-height: 1.1; color: var(--cream); margin-bottom: 20px; }
.hero-headline em { font-style: italic; color: var(--gold-pale); }
.hero-sub { font-size: 16px; font-weight: 300; color: rgba(255,255,255,0.85); max-width: 500px; margin-bottom: 24px; }

/* ─── MAIN PLATFORM CONTAINER ───────────────────────────────── */
.main-content { position: relative; z-index: 1; background: var(--sage-frost); border-radius: 28px 28px 0 0; padding: 40px 48px 60px; }
.section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
.section-title { font-family: var(--ff-display); font-size: 26px; font-style: italic; color: var(--text-primary); }

/* FILTER PILLS */
.filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 32px; }
.fpill { font-size: 12px; font-weight: 500; color: var(--text-muted); padding: 8px 16px; border-radius: 20px; border: 1.5px solid var(--cream-border); background: var(--cream); transition: all 0.2s; }
.fpill.on { color: var(--cream); border-color: var(--sage-deep); background: var(--sage-deep); font-weight: 600; }

/* CARD GRID */
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; }

/* CARD DESIGN */
.deal-card { background: var(--cream); border-radius: var(--radius-lg); box-shadow: var(--shadow-card); border: 1px solid rgba(45,66,53,0.06); overflow: hidden; display: flex; flex-direction: column; position: relative; }
.card-img-wrap { position: relative; width: 100%; aspect-ratio: 16 / 9; overflow: hidden; background: var(--sage-xlight); }
.card-img { width: 100%; height: 100%; object-fit: cover; }
.card-drop-badge { position: absolute; bottom: 12px; left: 12px; font-family: var(--ff-display); font-size: 20px; font-weight: 600; padding: 4px 12px; border-radius: var(--radius-sm); background: rgba(255,255,255,0.9); color: var(--sage-deep); }
.card-chip { position: absolute; bottom: 12px; right: 12px; font-size: 10px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; background: var(--sage-deep); color: var(--cream); }
.card-body { padding: 22px; flex: 1; display: flex; flex-direction: column; position: relative; }
.title-container { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px; }
.card-title { font-family: var(--ff-display); font-size: 18px; font-weight: 500; color: var(--text-primary); line-height: 1.3; }
.card-desc { font-size: 13px; line-height: 1.6; color: var(--text-secondary); margin-bottom: 20px; flex: 1; }
.card-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 12px; border-top: 1px solid var(--cream-border); }
.card-ts { font-size: 11px; color: var(--text-muted); }
.card-cta { font-size: 12px; font-weight: 600; color: var(--sage-deep); background: var(--sage-pale); border: 1px solid var(--sage-light); padding: 6px 14px; border-radius: var(--radius-sm); }

/* MICRO-ANIMATED OVERLAYS & PATHS */
.glyph-hype-overlay { position: absolute; top: 12px; right: 12px; z-index: 10; width: 32px; height: 32px; background: rgba(255,255,255,0.85); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(74,107,84,0.2); animation: floatOverlay 3s ease-in-out infinite; }
@keyframes floatOverlay { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
.glyph-home-inline { position: relative; display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; margin-top: 1px; flex-shrink: 0; }
.glyph-home-pulse { position: absolute; width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--gold); animation: pulseRing 2s ease-out infinite; opacity: 0; }
@keyframes pulseRing { 0% { transform: scale(0.5); opacity: 0.8; } 100% { transform: scale(1.4); opacity: 0; } }
.flight-track-container { position: relative; width: 100%; height: 20px; margin-bottom: 12px; background: rgba(74,107,84,0.04); border-radius: 4px; overflow: hidden; }
.glyph-airplane-runner { position: absolute; top: 2px; left: -30px; animation: cruisePlane 6s linear infinite; }
@keyframes cruisePlane { 0% { left: -30px; } 100% { left: 100%; } }

/* ─── SECURE CREDENTIAL CONTROLS PANEL ───────────────────────── */
.secure-panel { background: var(--slate); padding: 24px 48px; border-top: 1px solid rgba(255,255,255,0.05); color: var(--sage-frost); }
.secure-grid { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 16px; align-items: flex-end; max-width: 1400px; margin: 0 auto; }
.input-group { display: flex; flex-direction: column; gap: 6px; }
.input-group label { font-family: var(--ff-mono); font-size: 10px; color: var(--sage-light); text-transform: uppercase; letter-spacing: 0.05em; }
.secure-input { background: var(--slate-mid); border: 1px solid var(--slate-soft); border-radius: var(--radius-sm); padding: 10px 14px; font-family: var(--ff-mono); font-size: 12px; color: var(--cream); outline: none; width: 100%; }
.secure-input:focus { border-color: var(--sage-light); }
.btn-connect { background: var(--sage-deep); color: var(--cream); font-family: var(--ff-mono); font-size: 12px; font-weight: 600; padding: 11px 24px; border-radius: var(--radius-sm); cursor: pointer; transition: background 0.2s; height: 40px; }
.btn-connect:hover { background: #5b8266; }

.footer { background: var(--slate); padding: 32px 48px; display: flex; justify-content: space-between; align-items: center; color: var(--text-muted); font-size: 11px; }
@media (max-width: 768px) { .nav { padding: 16px 20px; } .main-content { padding: 32px 20px; } .secure-grid { grid-template-columns: 1fr; } .secure-panel { padding: 24px 20px; } }
</style>
</head>
